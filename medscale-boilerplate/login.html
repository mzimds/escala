<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrar — MedScale</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <!-- ── Toast container ── -->
  <div id="toasts"></div>

  <!-- ── Página de login ── -->
  <div class="login-page">
    <div class="login-box">

      <div class="login-logo">MedScale</div>
      <div class="login-tagline">Sistema de gestão de escalas médicas</div>

      <!-- Tabs: Entrar / Cadastrar -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Cadastrar</button>
      </div>

      <!-- Formulário: Login -->
      <div class="auth-form active" id="form-login">
        <div class="field">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="login-pass">Senha</label>
          <input id="login-pass" type="password" placeholder="••••••" autocomplete="current-password">
        </div>
        <div class="field-error" id="login-error"></div>
        <button class="btn btn-primary btn-full" id="btn-login" style="margin-top:4px">Entrar</button>
      </div>

      <!-- Formulário: Cadastro -->
      <div class="auth-form" id="form-signup">
        <div class="field">
          <label for="signup-email">E-mail</label>
          <input id="signup-email" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="signup-pass">Senha</label>
          <input id="signup-pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="signup-pass2">Confirmar senha</label>
          <input id="signup-pass2" type="password" placeholder="Repita a senha" autocomplete="new-password">
        </div>
        <div class="field-error" id="signup-error"></div>
        <button class="btn btn-primary btn-full" id="btn-signup" style="margin-top:4px">Criar conta</button>
      </div>

    </div>
  </div>

  <!-- Supabase SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- JS do login (module = suporta import/export) -->
  <script type="module" src="/js/login.js"></script>

</body>
</html>
